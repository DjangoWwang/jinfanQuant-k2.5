# docker-compose.yml — 生产配置
# 开发环境: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://fof_user:${DB_PASSWORD}@db:5432/fof_platform
  SECRET_KEY: ${SECRET_KEY}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  TZ: Asia/Shanghai

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

networks:
  frontend:
  backend:
    internal: true

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fof_platform
      POSTGRES_USER: fof_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fof_user -d fof_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redisdata:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      <<: *backend-env
    networks: [backend]
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${BACKEND_WORKERS:-2}
    environment:
      <<: *backend-env
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      FOF99_USERNAME: ${FOF99_USERNAME:-}
      FOF99_PASSWORD: ${FOF99_PASSWORD:-}
      FOF99_DEVICE_ID: ${FOF99_DEVICE_ID:-}
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY:-}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - report_data:/app/data/reports
    networks: [frontend, backend]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging: *default-logging
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    environment:
      <<: *backend-env
      FOF99_USERNAME: ${FOF99_USERNAME:-}
      FOF99_PASSWORD: ${FOF99_PASSWORD:-}
      FOF99_DEVICE_ID: ${FOF99_DEVICE_ID:-}
    volumes:
      - report_data:/app/data/reports
    networks: [backend]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app:celery_app inspect ping --timeout 5 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging: *default-logging
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    command: celery -A app.tasks.celery_app:celery_app beat --loglevel=info --schedule=/app/data/celerybeat-schedule
    environment:
      <<: *backend-env
      BEAT_ENABLED: "true"
      BEAT_DAILY_REFRESH_TIME: ${BEAT_DAILY_REFRESH_TIME:-06:00}
      BEAT_RISK_CHECK_TIME: ${BEAT_RISK_CHECK_TIME:-09:30}
      BEAT_NAV_CALC_TIME: ${BEAT_NAV_CALC_TIME:-20:00}
    volumes:
      - beat_schedule:/app/data
    networks: [backend]
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging: *default-logging
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      HOSTNAME: "0.0.0.0"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks: [frontend]
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  report_data:
  beat_schedule:
